<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CFR Simple Calculator</title>

<style>
body { font-family: Arial; padding:20px; }
table { border-collapse: collapse; margin-top:10px; }
td,th { border:1px solid #ccc; padding:6px; }
input { width:80px; }
</style>

</head>

<body>

<h2>📊 CFR Calculator (Simple)</h2>

Freight (USD): <input id="freight" value="0">
Rate: <input id="rate" value="33">
Tax %: <input id="tax" value="0">
Containers: <input id="container" value="0">

<br><br>
<button onclick="calculate()">Calculate</button>

<h3>Items</h3>
<table id="table">
<tr><th>Item</th><th>Qty</th><th>Unit Price</th></tr>
</table>

<h3>Result</h3>
<table id="result"></table>

<script>

// 🔥 สร้าง 20 รายการ
let table = document.getElementById("table");

for(let i=1;i<=20;i++){
  table.innerHTML += `
  <tr>
    <td><input value="Item ${i}"></td>
    <td><input type="number" value="0"></td>
    <td><input type="number" value="0"></td>
  </tr>`;
}

// 🔥 คำนวณ
function calculate(){

  let rows = document.querySelectorAll("#table tr");

  let freight = parseFloat(document.getElementById("freight").value) || 0;
  let rate = parseFloat(document.getElementById("rate").value) || 0;
  let taxRate = (parseFloat(document.getElementById("tax").value) || 0)/100;
  let container = parseFloat(document.getElementById("container").value) || 0;

  let clearingTotal = container * 40000;

  let data = [];
  let totalCFR = 0;

  rows.forEach((r,i)=>{
    if(i===0) return;

    let inputs = r.querySelectorAll("input");

    let item = inputs[0].value;
    let qty = parseFloat(inputs[1].value) || 0;
    let price = parseFloat(inputs[2].value) || 0;

    if(qty === 0 || price === 0) return;

    let total = qty * price;
    totalCFR += total;

    data.push({item,qty,price,total});
  });

  let html = "<tr><th>Item</th><th>Cost/Unit (THB)</th></tr>";

  data.forEach(r=>{
    let freightShare = totalCFR ? (r.total/totalCFR)*freight : 0;
    let cif = r.total + freightShare;
    let tax = cif * taxRate;
    let clearingShare = totalCFR ? (r.total/totalCFR)*clearingTotal : 0;

    let totalTHB = (cif + tax)*rate + clearingShare;
    let costUnit = totalTHB / r.qty;

    html += `<tr>
      <td>${r.item}</td>
      <td>${costUnit.toFixed(2)}</td>
    </tr>`;
  });

  document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
