<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CFR Cost Calculator</title>

<style>
body { font-family: Arial; padding:20px; }
table { border-collapse: collapse; margin-top:10px; }
td,th { border:1px solid #ccc; padding:6px; text-align:center; }
input { width:90px; }
</style>

</head>

<body>

<h2>📊 CFR Cost Calculator (Manual)</h2>

Freight (USD): <input id="freight" value="0">
Exchange Rate: <input id="rate" value="33">
Tax %: <input id="tax" value="0">

<br><br>

Containers (Qty): <input id="containerQty" value="0">
Clearing Cost / Container (THB): <input id="clearPerContainer" value="40000">

<br><br>
<button onclick="calculate()">Calculate</button>

<h3>Items</h3>
<table id="table">
<tr>
<th>Item</th>
<th>Qty</th>
<th>Unit Price (USD)</th>
<th>Total CFR (USD)</th>
</tr>
</table>

<h3>Result</h3>
<table id="result"></table>

<script>

// 🔥 สร้าง 20 แถว
let table = document.getElementById("table");

for(let i=1;i<=20;i++){
  table.innerHTML += `
  <tr>
    <td><input value="Item ${i}"></td>
    <td><input type="number" value="0"></td>
    <td><input type="number" value="0"></td>
    <td class="cfr">0</td>
  </tr>`;
}

// 🔥 คำนวณ
function calculate(){

  let rows = document.querySelectorAll("#table tr");

  let freight = parseFloat(document.getElementById("freight").value) || 0;
  let rate = parseFloat(document.getElementById("rate").value) || 0;
  let taxRate = (parseFloat(document.getElementById("tax").value) || 0)/100;

  let containerQty = parseFloat(document.getElementById("containerQty").value) || 0;
  let clearPerContainer = parseFloat(document.getElementById("clearPerContainer").value) || 0;

  // 🔥 รวมค่าเคลียร์
  let clearingTotal = containerQty * clearPerContainer;

  let data = [];
  let totalCFR = 0;

  // คำนวณ CFR
  rows.forEach((r,i)=>{
    if(i===0) return;

    let inputs = r.querySelectorAll("input");

    let item = inputs[0].value;
    let qty = parseFloat(inputs[1].value) || 0;
    let price = parseFloat(inputs[2].value) || 0;

    let total = qty * price;

    r.querySelector(".cfr").innerText = total.toFixed(2);

    if(qty === 0 || price === 0) return;

    totalCFR += total;

    data.push({item,qty,price,total});
  });

  let html = `
  <tr>
    <th>Item</th>
    <th>Total CFR (USD)</th>
    <th>Total Cost (THB)</th>
    <th>Cost/Unit (THB)</th>
  </tr>`;

  // 🔥 ปันต้นทุน
  data.forEach(r=>{

    let ratio = totalCFR ? r.total / totalCFR : 0;

    let freightTHB = freight * rate * ratio;
    let clearingTHB = clearingTotal * ratio;

    let cifUSD = r.total + (freight * ratio);
    let taxUSD = cifUSD * taxRate;

    let totalTHB =
      (r.total * rate) +        // CFR
      freightTHB +              // Freight
      clearingTHB +             // Clearing
      (taxUSD * rate);          // Tax

    let costUnit = totalTHB / r.qty;

    html += `<tr>
      <td>${r.item}</td>
      <td>${r.total.toFixed(2)}</td>
      <td>${totalTHB.toFixed(2)}</td>
      <td>${costUnit.toFixed(2)}</td>
    </tr>`;
  });

  document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
