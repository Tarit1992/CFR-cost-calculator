<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CFR Cost Calculator</title>

<style>
body { font-family: Arial; padding:20px; }
table { border-collapse: collapse; margin-top:10px; }
td,th { border:1px solid #ccc; padding:6px; text-align:center; }
input { width:90px; }
.totalRow { background:#eee; font-weight:bold; }
</style>

</head>

<body>

<h2>📊 CFR Cost Calculator (Correct Logic)</h2>

Freight (USD): <input id="freight" value="0">
Exchange Rate: <input id="rate" value="33">
Tax %: <input id="tax" value="0">

<br><br>

Containers: <input id="containerQty" value="0">
Clearing / Container (THB): <input id="clearPerContainer" value="40000">

<br><br>
<button onclick="calculate()">Calculate</button>

<h3>Items</h3>
<table id="table">
<tr>
<th>Item</th>
<th>Qty</th>
<th>Unit Price (USD)</th>
<th>FOB (USD)</th>
</tr>
</table>

<h3>Summary</h3>
<table id="summary"></table>

<h3>Result</h3>
<table id="result"></table>

<script>

// สร้าง 20 รายการ
let table = document.getElementById("table");

for(let i=1;i<=20;i++){
  table.innerHTML += `
  <tr>
    <td><input value="Item ${i}"></td>
    <td><input type="number" value="0"></td>
    <td><input type="number" value="0"></td>
    <td class="fob">0</td>
  </tr>`;
}

function calculate(){

  let rows = document.querySelectorAll("#table tr");

  let freightUSD = parseFloat(document.getElementById("freight").value) || 0;
  let rate = parseFloat(document.getElementById("rate").value) || 0;
  let taxRate = (parseFloat(document.getElementById("tax").value) || 0)/100;

  let containerQty = parseFloat(document.getElementById("containerQty").value) || 0;
  let clearPerContainer = parseFloat(document.getElementById("clearPerContainer").value) || 0;

  let clearingTHB = containerQty * clearPerContainer;

  let data = [];
  let totalFOB = 0;

  // 🔹 คำนวณ FOB
  rows.forEach((r,i)=>{
    if(i===0) return;

    let inputs = r.querySelectorAll("input");

    let item = inputs[0].value;
    let qty = parseFloat(inputs[1].value) || 0;
    let price = parseFloat(inputs[2].value) || 0;

    let fob = qty * price;

    r.querySelector(".fob").innerText = fob.toFixed(2);

    if(qty === 0 || price === 0) return;

    totalFOB += fob;

    data.push({item,qty,price,fob});
  });

  // 🔹 คำนวณค่าใช้จ่ายรวม
  let freightTHB = freightUSD * rate;

  let cifUSD = totalFOB + freightUSD;
  let taxUSD = cifUSD * taxRate;
  let taxTHB = taxUSD * rate;

  let totalExtraCost = freightTHB + taxTHB + clearingTHB;

  // 🔹 Summary
  document.getElementById("summary").innerHTML = `
    <tr class="totalRow"><td>Total FOB</td><td>${totalFOB.toFixed(2)} USD</td></tr>
    <tr class="totalRow"><td>Freight</td><td>${freightTHB.toFixed(2)} THB</td></tr>
    <tr class="totalRow"><td>Tax</td><td>${taxTHB.toFixed(2)} THB</td></tr>
    <tr class="totalRow"><td>Clearing</td><td>${clearingTHB.toFixed(2)} THB</td></tr>
    <tr class="totalRow"><td>Total Extra Cost</td><td>${totalExtraCost.toFixed(2)} THB</td></tr>
  `;

  // 🔹 ปันต้นทุน
  let html = `
  <tr>
    <th>Item</th>
    <th>FOB (USD)</th>
    <th>Allocated Cost (THB)</th>
    <th>Total Cost (THB)</th>
    <th>Cost/Unit (THB)</th>
  </tr>`;

  data.forEach(r=>{

    let ratio = totalFOB ? r.fob / totalFOB : 0;

    let allocated = totalExtraCost * ratio;

    let totalTHB = (r.fob * rate) + allocated;

    let costUnit = totalTHB / r.qty;

    html += `<tr>
      <td>${r.item}</td>
      <td>${r.fob.toFixed(2)}</td>
      <td>${allocated.toFixed(2)}</td>
      <td>${totalTHB.toFixed(2)}</td>
      <td>${costUnit.toFixed(2)}</td>
    </tr>`;
  });

  document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
