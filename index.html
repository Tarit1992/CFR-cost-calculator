<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CFR Calculator Pro+</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
table { border-collapse: collapse; }
td,th { padding:8px; border:1px solid #ccc; }
input { width:90px; }
</style>
</head>

<body>

<h2>📊 CFR Calculator (Manual + Upload)</h2>

<input type="file" id="upload"><br><br>

<div id="mapping"></div>

<br>
Freight (USD): <input id="freight" value="0">
Rate: <input id="rate" value="0">
Tax %: <input id="tax" value="0">
Containers: <input id="container" value="0">

<br><br>
<button onclick="loadData()">Load From File</button>
<button onclick="createManual()">Manual 20 Rows</button>
<button onclick="process()">Calculate</button>

<h3>Editable Data</h3>
<table id="editTable"></table>

<h3>Result</h3>
<table id="result"></table>

<script>

let rawData = [];
let headers = [];

document.getElementById('upload').addEventListener('change', function(e){
  let reader = new FileReader();
  reader.onload = function(e){
    let wb = XLSX.read(e.target.result, {type:'binary'});
    let sheet = wb.Sheets[wb.SheetNames[0]];
    rawData = XLSX.utils.sheet_to_json(sheet, {header:1});
    headers = rawData[0];
    renderMapping();
  };
  reader.readAsBinaryString(e.target.files[0]);
});

function renderMapping(){
  let html = "<h3>Select Columns</h3>";
  html += createSelect("item","Item");
  html += createSelect("qty","Qty");
  html += createSelect("price","Price");
  document.getElementById("mapping").innerHTML = html;
}

function createSelect(id,label){
  let html = label + ": <select id='"+id+"'>";
  headers.forEach((h,i)=>{
    html += `<option value="${i}">${h}</option>`;
  });
  html += "</select><br>";
  return html;
}

// 🔥 Manual 20 rows
function createManual(){
  let table = document.getElementById("editTable");
  table.innerHTML = "<tr><th>Item</th><th>Qty</th><th>Unit Price</th></tr>";

  for(let i=1;i<=20;i++){
    table.innerHTML += `<tr>
      <td><input value="Item ${i}"></td>
      <td><input type="number" value="0"></td>
      <td><input type="number" value="0"></td>
    </tr>`;
  }
}

// 🔥 Load from Excel
function loadData(){
  let itemCol = document.getElementById("item").value;
  let qtyCol = document.getElementById("qty").value;
  let priceCol = document.getElementById("price").value;

  let table = document.getElementById("editTable");
  table.innerHTML = "<tr><th>Item</th><th>Qty</th><th>Unit Price</th></tr>";

  rawData.slice(1).forEach((r)=>{
    table.innerHTML += `<tr>
      <td><input value="${r[itemCol] || ""}"></td>
      <td><input type="number" value="${r[qtyCol] || 0}"></td>
      <td><input type="number" value="${r[priceCol] || 0}"></td>
    </tr>`;
  });
}

// 🔥 Calculate
function process(){

  let rows = document.querySelectorAll("#editTable tr");

  let freight = parseFloat(document.getElementById("freight").value) || 0;
  let rate = parseFloat(document.getElementById("rate").value) || 0;
  let taxRate = (parseFloat(document.getElementById("tax").value) || 0)/100;
  let container = parseFloat(document.getElementById("container").value) || 0;

  let clearingTotal = container * 40000;

  let data = [];
  let totalCFR = 0;

  rows.forEach((r,i)=>{
    if(i===0) return;

    let inputs = r.querySelectorAll("input");

    let item = inputs[0].value;
    let qty = parseFloat(inputs[1].value) || 0;
    let price = parseFloat(inputs[2].value) || 0;

    if(qty === 0 || price === 0) return;

    let total = qty * price;
    totalCFR += total;

    data.push({item,qty,price,total});
  });

  let html = "<tr><th>Item</th><th>Cost/Unit (THB)</th></tr>";

  data.forEach(r=>{
    let freightShare = totalCFR ? (r.total/totalCFR)*freight : 0;
    let cif = r.total + freightShare;
    let tax = cif * taxRate;
    let clearingShare = totalCFR ? (r.total/totalCFR)*clearingTotal : 0;

    let totalTHB = (cif + tax)*rate + clearingShare;
    let costUnit = r.qty ? totalTHB / r.qty : 0;

    html += `<tr>
      <td>${r.item}</td>
      <td>${costUnit.toFixed(2)}</td>
    </tr>`;
  });

  document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
