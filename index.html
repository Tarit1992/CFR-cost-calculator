<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CFR Auto Cost Calculator</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
table { border-collapse: collapse; margin-top:10px;}
td,th { border:1px solid #ccc; padding:6px;}
input { width:90px;}
</style>

</head>

<body>

<h2>📊 Auto CFR → Cost per Unit</h2>

<input type="file" id="upload"><br><br>

Freight (USD): <input id="freight" value="0">
Rate: <input id="rate" value="33">
Tax %: <input id="tax" value="0">
Containers: <input id="container" value="0">

<br><br>
<button onclick="autoProcess()">Auto Detect + Load</button>
<button onclick="calculate()">Calculate Cost</button>

<h3>Data</h3>
<table id="table"></table>

<h3>Result</h3>
<table id="result"></table>

<script>

let rawData = [];
let headers = [];

document.getElementById('upload').addEventListener('change', function(e){
  let reader = new FileReader();
  reader.onload = function(e){
    let wb = XLSX.read(e.target.result, {type:'binary'});
    let sheet = wb.Sheets[wb.SheetNames[0]];
    rawData = XLSX.utils.sheet_to_json(sheet, {header:1});
    headers = rawData[0];
  };
  reader.readAsBinaryString(e.target.files[0]);
});

// 🔥 หา column อัตโนมัติ
function detectColumns(headers){
  function find(keys){
    return headers.findIndex(h =>
      keys.some(k => h.toLowerCase().includes(k))
    );
  }

  return {
    item: find(["item","description","model"]),
    qty: find(["qty","quantity","pcs"]),
    price: find(["price","unit","cost","cfr"])
  };
}

// 🔥 หา freight
function detectFreight(data){
  let freight = 0;

  data.forEach(row=>{
    row.forEach(cell=>{
      if(typeof cell === "string"){
        let t = cell.toLowerCase();
        if(t.includes("freight")){
          let num = t.match(/[\d,]+\.?\d*/);
          if(num){
            freight = parseFloat(num[0].replace(/,/g,""));
          }
        }
      }
    });
  });

  return freight;
}

// 🔥 load data
function autoProcess(){

  let col = detectColumns(headers);

  let freight = detectFreight(rawData);
  if(freight){
    document.getElementById("freight").value = freight;
  }

  let table = document.getElementById("table");
  table.innerHTML = "<tr><th>Item</th><th>Qty</th><th>Unit Price</th></tr>";

  rawData.slice(1).forEach(r=>{
    let item = r[col.item] || "";
    let qty = r[col.qty] || 0;
    let price = r[col.price] || 0;

    table.innerHTML += `<tr>
      <td><input value="${item}"></td>
      <td><input type="number" value="${qty}"></td>
      <td><input type="number" value="${price}"></td>
    </tr>`;
  });

}

// 🔥 คำนวณต้นทุนต่อหน่วย
function calculate(){

  let rows = document.querySelectorAll("#table tr");

  let freight = parseFloat(document.getElementById("freight").value) || 0;
  let rate = parseFloat(document.getElementById("rate").value) || 0;
  let taxRate = (parseFloat(document.getElementById("tax").value) || 0)/100;
  let container = parseFloat(document.getElementById("container").value) || 0;

  let clearingTotal = container * 40000;

  let data = [];
  let totalCFR = 0;

  rows.forEach((r,i)=>{
    if(i===0) return;

    let inputs = r.querySelectorAll("input");

    let item = inputs[0].value;
    let qty = parseFloat(inputs[1].value);
    let price = parseFloat(inputs[2].value);

    if(!qty || !price) return;

    let total = qty * price;
    totalCFR += total;

    data.push({item,qty,price,total});
  });

  let html = "<tr><th>Item</th><th>Cost/Unit (THB)</th></tr>";

  data.forEach(r=>{
    let freightShare = (r.total/totalCFR)*freight;
    let cif = r.total + freightShare;
    let tax = cif * taxRate;
    let clearingShare = (r.total/totalCFR)*clearingTotal;

    let totalTHB = (cif + tax)*rate + clearingShare;
    let costUnit = totalTHB / r.qty;

    html += `<tr>
      <td>${r.item}</td>
      <td>${costUnit.toFixed(2)}</td>
    </tr>`;
  });

  document.getElementById("result").innerHTML = html;

}

</script>

</body>
</html>
